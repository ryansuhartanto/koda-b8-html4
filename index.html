<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input</title>
</head>

<body>
    <h1>Form Survey Perokok</h1>

    <form>
        <div>
            <label for="name">Siapa nama anda?</label>
            <br>
            <input type="text" name="name" id="name">
        </div>
        <div>
            <label for="age">Berapa umur anda?</label>
            <br>
            <input type="number" name="age" id="age">
        </div>
        <div>
            <label>Apa jenis kelamin anda?</label>
            <br>
            <input type="radio" name="gender" id="male">
            <label for="male">Laki-laki</label>
            <input type="radio" name="gender" id="female">
            <label for="female">Perempuan</label>
        </div>
        <div>
            <label>Apakah anda perokok?</label>
            <br>
            <input type="radio" name="smoking" id="positive">
            <label for="positive">Ya</label>
            <input type="radio" name="smoking" id="negative">
            <label for="negative">Tidak</label>
        </div>
        <div>
            <label>Jika anda perokok, rokok apa yang anda pernah coba?</label>
            <br>
            <input type="checkbox" name="brand" id="gudang-garam-filter">
            <label for="gudang-garam-filter">Gudang Garam Filter</label>
            <br>
            <input type="checkbox" name="brand" id="lucky-strike">
            <label for="lucky-strike">Lucky Strike</label>
            <br>
            <input type="checkbox" name="brand" id="marlboro">
            <label for="marlboro">Marlboro</label>
            <br>
            <input type="checkbox" name="brand" id="esse">
            <label for="esse">Esse</label>
        </div>
    </form>
</body>

</html>
