<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Survey Perokok</title>

  <style>
    body {
      margin: 0;
      width: 100%;
      min-height: 100dvh;

      font-family: sans-serif;

      --main: #7438d2;
      --light: #efebfc;

      background-color: var(--light);
    }

    a {
      color: var(--main);

      margin-block: 0.5rem;

      font-size: small;
      font-weight: bold;
      text-decoration: none;

      &:hover {
        text-decoration: underline;
      }
    }

    h1 {
      margin: 0;
      font-weight: inherit;
    }

    main {
      max-width: 48rem;
      margin-inline: auto;
      padding: 1rem;

      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;

      &>div:not(:last-of-type) {
        padding: 1.5rem;
        padding-block: 1.75rem;
        border-color: color-mix(in oklch, #000 20%, transparent);
        border-style: solid;
        border-width: 1px;
        border-radius: 0.5rem;

        &:has(h1) {
          border-start-start-radius: 1rem;
          border-start-end-radius: 1rem;

          border-block-start-width: 1rem;
          border-block-start-color: var(--main);
        }

        background-color: white;

        display: flex;
        flex-direction: column;
        gap: 1.5rem;

        &> :first-child:has(:not(h1)) {
          font-size: large;
        }

        &> :not(:first-child) {
          display: flex;
          align-items: center;
          gap: 0.75rem;
        }
      }

      &>div:last-of-type {
        display: flex;
        justify-content: space-between;
      }
    }

    button {
      width: fit-content;

      font-size: small;
      font-weight: bold;

      padding: 0.625rem;

      color: var(--main);
      background: none;
      border: none;

      cursor: pointer;

      &[type="submit"] {
        padding-inline: 1.5rem;

        color: #fff;
        background-color: #7438d2;
        border-color: color-mix(in oklch, #000 20%, transparent);
        border-style: solid;
        border-width: 1px;
        border-radius: 0.25rem;
      }
    }

    input {
      border: 0;

      &[type="text"],
      &[type="number"] {
        padding: 1rem;
        padding-block: 1.25rem;

        background-color: color-mix(in oklch, #000 2.5%, transparent);

        border-block-end-width: 1px;
        border-block-end-color: color-mix(in oklch, #000 50%, transparent);
        border-block-end-style: solid;

        margin-block-end: 1px;

        &:focus {
          outline: none;

          border-block-end-width: 2px;
          border-block-end-color: #000;

          margin-block-end: 0;
        }
      }

      &[type="radio"],
      &[type="checkbox"] {
        margin: 0;
        vertical-align: middle;
        appearance: none;

        width: 1.25rem;
        height: 1.25rem;

        border-color: color-mix(in oklch, #000 20%, transparent);
        border-style: solid;
        border-width: 2px;

        &:checked {
          border-color: var(--main);
        }

        cursor: pointer;

        display: grid;
        place-content: center;
      }

      &[type="radio"] {
        border-radius: 100rem;

        &:checked::after {
          content: "";

          width: 0.625rem;
          height: 0.625rem;
          border-radius: 100rem;

          background-color: var(--main);
        }
      }

      &[type="checkbox"] {
        border-radius: 0.25rem;

        &:checked {
          color: #fff;
          background-color: var(--main);

          &::after {
            content: "\2713";
          }
        }
      }
    }
  </style>
</head>

<body>
  <script>
    const title = "Form Survey Perokok";
    const fields = [
      {
        input: "name",
        label: "Siapa nama Anda?",
        type: "text",
      },
      {
        input: "age",
        label: "Berapa umur Anda?",
        type: "number",
      },
      {
        input: "gender",
        label: "Apa jenis kelamin Anda?",
        type: "radio",
        choices: [
          {
            value: "male",
            label: "Laki-laki",
          },
          {
            value: "female",
            label: "Perempuan",
          },
        ],
      },
      {
        input: "smoking",
        label: "Apakah Anda perokok?",
        type: "radio",
        choices: [
          {
            value: "1",
            label: "Ya",
          },
          {
            value: "0",
            label: "Tidak",
          },
        ],
      },
      {
        input: "brand",
        label: "Jika anda perokok, rokok apa yang anda pernah coba?",
        type: "checkbox",
        choices: [
          {
            value: "gudang-garam-filter",
            label: "Gudang Garam Filter",
          },
          {
            value: "lucky-strike",
            label: "Lucky Strike",
          },
          {
            value: "marlboro",
            label: "Marlboro",
          },
          {
            value: "esse",
            label: "Esse",
          },
        ],
      },
    ];

    const main = document.createElement("main");
    const form = document.createElement("form");

    document.body.append(main);
    main.append(form);

    function wrapElementWithDiv(...el) {
      const div = document.createElement("div");
      for (const e of el) {
        div.append(e);
      }
      return div;
    }

    const h1 = document.createElement("h1");
    h1.textContent = title;

    form.append(wrapElementWithDiv(h1));

    for (const field of fields) {
      const label = document.createElement("label");
      label.htmlFor = field.input;
      label.textContent = field.label;

      const inputs = [];

      if (field.choices) {
        for (const choice of field.choices) {
          const input = document.createElement("input");
          input.type = field.type;
          input.name = field.input;
          input.id = choice.value;
          input.value = choice.value;

          const label = document.createElement("label");
          label.htmlFor = choice.value;
          label.textContent = choice.label;

          inputs.push(wrapElementWithDiv(input, label));
        }
      } else {
        const input = document.createElement("input");
        input.type = field.type;
        input.name = field.input;
        input.id = field.input;
        input.placeholder = "Jawaban Anda";

        inputs.push(input);
      }

      form.append(wrapElementWithDiv(wrapElementWithDiv(label), ...inputs));
    }

    const submitButton = document.createElement("button");
    submitButton.type = "submit";
    submitButton.textContent = "Simpan";
    const resetButton = document.createElement("button");
    resetButton.type = "reset";
    resetButton.textContent = "Bersihkan form";

    form.append(wrapElementWithDiv(submitButton, resetButton));

    const resultButton = document.createElement("a");
    resultButton.href = "result.html";
    resultButton.textContent = "Lihat hasil";
    main.append(wrapElementWithDiv(resultButton));;
  </script>
</body>

</html>
