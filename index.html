<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Survey Perokok</title>

    <style>
        body {
            margin: 0;
            width: 100%;
            min-height: 100dvh;

            font-family: sans-serif;

            --main: #7438d2;
            --light: #efebfc;

            background-color: var(--light);
        }

        a {
            color: var(--main);

            margin-block: .5rem;

            font-size: small;
            text-decoration: none;

            &:hover {
                text-decoration: underline;
            }
        }

        h1 {
            margin: 0;
            font-weight: inherit;
        }

        main {
            max-width: 48rem;
            margin-inline: auto;
            padding: 1rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;

            &>div:not(:last-of-type) {
                padding: 1.5rem;
                padding-block: 1.75rem;
                border-color: color-mix(in oklch, #000 20%, transparent);
                border-style: solid;
                border-width: 1px;
                border-radius: .5rem;

                &:has(h1) {
                    border-start-start-radius: 1rem;
                    border-start-end-radius: 1rem;

                    border-block-start-width: 1rem;
                    border-block-start-color: var(--main);
                }

                background-color: white;

                display: flex;
                flex-direction: column;
                gap: 1.5rem;

                &>:first-child:has(:not(h1)) {
                    font-size: large;
                }

                &>:not(:first-child) {
                    display: flex;
                    align-items: center;
                    gap: .75rem;
                }
            }

            &>div:last-of-type {
                display: flex;
                justify-content: space-between;
            }
        }

        button {
            width: fit-content;

            font-size: small;
            font-weight: bold;

            padding: .625rem;

            color: var(--main);
            background: none;
            border: none;

            &[type="submit"] {
                padding-inline: 1.5rem;

                color: #fff;
                background-color: #7438d2;
                border-color: color-mix(in oklch, #000 20%, transparent);
                border-style: solid;
                border-width: 1px;
                border-radius: .25rem;
            }
        }

        input {
            border: 0;

            &[type="text"],
            &[type="number"] {
                padding: 1rem;
                padding-block: 1.25rem;

                background-color: color-mix(in oklch, #000 2.5%, transparent);

                border-block-end-width: 1px;
                border-block-end-color: color-mix(in oklch, #000 50%, transparent);
                border-block-end-style: solid;

                margin-block-end: 1px;

                &:focus {
                    outline: none;

                    border-block-end-width: 2px;
                    border-block-end-color: #000;

                    margin-block-end: 0;
                }
            }

            &[type="radio"],
            &[type="checkbox"] {
                margin: 0;
                vertical-align: middle;
                appearance: none;

                width: 1.25rem;
                height: 1.25rem;

                border-color: color-mix(in oklch, #000 20%, transparent);
                border-style: solid;
                border-width: 2px;

                &:checked {
                    border-color: var(--main);
                }

                cursor: pointer;

                display: grid;
                place-content: center;
            }

            &[type="radio"] {
                border-radius: 100rem;

                &:checked::after {
                    content: "";

                    width: .625rem;
                    height: .625rem;
                    border-radius: 100rem;

                    background-color: var(--main);
                }
            }

            &[type="checkbox"] {
                border-radius: .25rem;

                &:checked {
                    color: #fff;
                    background-color: var(--main);

                    &::after {
                        content: "\2713";
                    }
                }
            }
        }
    </style>
</head>

<body>
    <main>
        <form>
            <div>
                <h1>Form Survey Perokok</h1>
            </div>
            <div>
                <div><label for="name">Siapa nama anda?</label></div>
                <input type="text" name="name" id="name" placeholder="Jawaban Anda">
            </div>
            <div>
                <div><label for="age">Berapa umur anda?</label></div>
                <input type="number" name="age" id="age" placeholder="Jawaban Anda">
            </div>
            <div>
                <div><label>Apa jenis kelamin anda?</label></div>
                <div>
                    <input type="radio" name="gender" id="male">
                    <label for="male">Laki-laki</label>
                </div>
                <div>
                    <input type="radio" name="gender" id="female">
                    <label for="female">Perempuan</label>
                </div>
            </div>
            <div>
                <div><label>Apakah anda perokok?</label></div>
                <div>
                    <input type="radio" name="smoking" id="positive" value="1">
                    <label for="positive">Ya</label>
                </div>
                <div>
                    <input type="radio" name="smoking" id="negative" value="0">
                    <label for="negative">Tidak</label>
                </div>
            </div>
            <div>
                <div><label>Jika anda perokok, rokok apa yang anda pernah coba?</label></div>
                <div>
                    <input type="checkbox" name="brand" id="gudang-garam-filter" value="gudang-garam-filter">
                    <label for="gudang-garam-filter">Gudang Garam Filter</label>
                </div>
                <div>
                    <input type="checkbox" name="brand" id="lucky-strike" value="lucky-strike">
                    <label for="lucky-strike">Lucky Strike</label>
                </div>
                <div>
                    <input type="checkbox" name="brand" id="marlboro" value="marlboro">
                    <label for="marlboro">Marlboro</label>
                </div>
                <div>
                    <input type="checkbox" name="brand" id="esse" value="esse">
                    <label for="esse">Esse</label>
                </div>
            </div>
            <div>
                <button type="submit">Simpan</button>
                <button type="reset">Bersihkan form</button>
            </div>
            <a href="/result.html">
                Lihat data survey
            </a>
        </form>
    </main>
</body>

</html>
