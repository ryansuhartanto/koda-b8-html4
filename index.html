<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Survey Perokok</title>

  <script type="importmap">
    {
      "imports": {
        "jquery": "https://esm.sh/jquery@4",
        "tailwindcss": "https://esm.sh/@tailwindcss/browser@4.3"
      }
    }
  </script>
  <script type="module" defer>
    import "tailwindcss";
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,slnt,wdth,wght,GRAD,ROND@6..144,-10..0,25..151,1..1000,0..100,0..100&display=swap">

  <style type="text/tailwindcss">
    @theme {
      --font-sans: "Google Sans Flex";
      --color-main: #7438d2;
      --color-light: #efebfc;
    }

    .field:has([required]) > div:first-child label::after {
      content: " *";
      color: #ef4444;
    }
  </style>
</head>

<body>
  <script type="module">
    import $ from "jquery";

    const twP = {
      "card-base": "p-6 py-7 border border-black/20 bg-white flex flex-col gap-6",
      "card-header": "rounded-b-lg rounded-t-2xl border-t-[16px] border-t-main",
      "card-field": "rounded-lg",
      "button-base": "w-fit text-sm font-medium p-2.5 cursor-pointer",
      "btn-submit": "px-6 text-white bg-main border border-black/20 rounded hover:opacity-90 transition-opacity",
      "btn-reset": "text-main bg-transparent border-none hover:underline",
      "input-toggle": "w-5 h-5 cursor-pointer accent-main",
    };

    const title = "Form Survey Perokok";
    const fields = [
      {
        input: "name",
        label: "Siapa nama Anda?",
        type: "text",
        required: true,
      },
      {
        input: "age",
        label: "Berapa umur Anda?",
        type: "number",
        required: true,
      },
      {
        input: "gender",
        label: "Apa jenis kelamin Anda?",
        type: "radio",
        required: true,
        choices: [
          {
            value: "male",
            label: "Laki-laki",
          },
          {
            value: "female",
            label: "Perempuan",
          },
        ],
      },
      {
        input: "smoking",
        label: "Apakah Anda perokok?",
        type: "radio",
        required: true,
        choices: [
          {
            value: "1",
            label: "Ya",
          },
          {
            value: "0",
            label: "Tidak",
          },
        ],
      },
      {
        input: "brand[]",
        label: "Jika anda perokok, rokok apa yang anda pernah coba?",
        type: "checkbox",
        choices: [
          {
            value: "gudang-garam-filter",
            label: "Gudang Garam Filter",
          },
          {
            value: "lucky-strike",
            label: "Lucky Strike",
          },
          {
            value: "marlboro",
            label: "Marlboro",
          },
          {
            value: "esse",
            label: "Esse",
          },
        ],
      },
    ];

    await $.ready;

    $("body").addClass("w-full min-h-[100dvh] font-sans bg-light");

    const $main = $("<main/>", {
      class: "max-w-[48rem] mx-auto p-4 flex flex-col gap-6",
    }).appendTo("body");

    const $form = $("<form/>", {
      class: "flex flex-col gap-4",
    }).appendTo($main);

    $("<div/>", {
      class: `${twP["card-base"]} ${twP["card-header"]}`,
    })
      .append($("<h1/>", {
        text: title,
        class: "text-3xl"
      }))
      .appendTo($form);

    for (const field of fields) {
      const $field = $("<div/>", {
        class: `field ${twP["card-base"]} ${twP["card-field"]}`,
      }).appendTo($form);

      $("<div/>", {
        class: "text-lg",
      })
        .append($("<label/>", {
          for: field.input,
          text: field.label,
        }))
        .appendTo($field);

      if (field.choices) {
        for (const choice of field.choices) {
          $("<div/>", {
            class: "flex items-center gap-3",
          })
            .append(
              $("<input/>", {
                type: field.type,
                name: field.input,
                id: choice.value,
                value: choice.value,
                class: twP["input-toggle"],
                ...(field.required && { required: true }),
              }),
              $("<label/>", {
                for: choice.value,
                text: choice.label,
                class: "cursor-pointer",
              }),
            )
            .appendTo($field);
        }
      } else {
        $("<input/>", {
          type: field.type,
          name: field.input,
          id: field.input,
          placeholder: "Jawaban Anda",
          class: "border-0 p-4 py-5 bg-black/[0.025] border-b border-black/50 mb-[1px] focus:outline-none focus:border-b-2 focus:border-black focus:mb-0",
          ...(field.required && { required: true }),
        }).appendTo($field);
      }
    }

    $("<div/>", {
      class: "flex justify-between mt-2",
    })
      .append(
        $("<button/>", {
          type: "submit",
          text: "Simpan",
          class: `${twP["button-base"]} ${twP["btn-submit"]}`,
        }),
        $("<button/>", {
          type: "reset",
          text: "Bersihkan form",
          class: `${twP["button-base"]} ${twP["btn-reset"]}`,
        }),
      )
      .appendTo($form);

    $("<div/>")
      .append(
        $("<a/>", {
          href: "result.html",
          text: "Lihat hasil",
          class: "text-main my-2 text-sm font-medium no-underline hover:underline block",
        }),
      )
      .appendTo($main);

    $form.on("submit", (e) => {
      e.preventDefault();

      const data = {};
      const formData = new FormData(e.target);
      for (const key of new Set(formData.keys())) {
        if (key.endsWith("[]")) {
          data[key.slice(0, -2)] = formData.getAll(key);
        } else {
          data[key] = formData.get(key);
        }
      }

      const oldData = window.localStorage.getItem("data");
      const combinedData = oldData ? JSON.parse(oldData) : [];

      combinedData.push(data);
      window.localStorage.setItem("data", JSON.stringify(combinedData));

      $form.empty().append(
        $("<div/>", {
          class: `${twP["card-base"]} ${twP["card-header"]}`,
        }).append($("<h1/>", {
          text: "Terimakasih telah mengisi form ini.",
        }))
      );
    });
  </script>
</body>

</html>
