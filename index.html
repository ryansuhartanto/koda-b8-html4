<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Survey Perokok</title>
</head>

<body>
    <h1>Form Survey Perokok</h1>

    <form>
        <div>
            <div><label for="name">Siapa nama anda?</label></div>
            <input type="text" name="name" id="name">
        </div>
        <div>
            <div><label for="age">Berapa umur anda?</label></div>
            <input type="number" name="age" id="age">
        </div>
        <div>
            <div><label>Apa jenis kelamin anda?</label></div>
            <input type="radio" name="gender" id="male">
            <label for="male">Laki-laki</label>
            <input type="radio" name="gender" id="female">
            <label for="female">Perempuan</label>
        </div>
        <div>
            <div><label>Apakah anda perokok?</label></div>
            <input type="radio" name="smoking" id="positive" value="1">
            <label for="positive">Ya</label>
            <input type="radio" name="smoking" id="negative" value="0">
            <label for="negative">Tidak</label>
        </div>
        <div>
            <div><label>Jika anda perokok, rokok apa yang anda pernah coba?</label></div>
            <div>
                <input type="checkbox" name="brand" id="gudang-garam-filter" value="gudang-garam-filter">
                <label for="gudang-garam-filter">Gudang Garam Filter</label>
            </div>
            <div>
                <input type="checkbox" name="brand" id="lucky-strike" value="lucky-strike">
                <label for="lucky-strike">Lucky Strike</label>
            </div>
            <div>
                <input type="checkbox" name="brand" id="marlboro" value="marlboro">
                <label for="marlboro">Marlboro</label>
            </div>
            <div>
                <input type="checkbox" name="brand" id="esse" value="esse">
                <label for="esse">Esse</label>
            </div>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>

    <a href="/result.html">
        Lihat data survey
    </a>
</body>

</html>
