  <script>
    const tbody = document.querySelector("tbody");

    function makeRowData(data) {
      const dataEl = document.createElement("td");
      dataEl.innerText = data;
      return dataEl;
    }

    function makeRow(i, { name, age, gender, smoking, brand = [] }) {
      const row = document.createElement("tr");

      switch (gender) {
        case "male":
          gender = "Laki-laki";
          break;
        case "female": {
          gender = "Perempuan";
          break;
        }
      }

      smoking = smoking === "0" ? "Tidak" : "Ya";

      brand = brand.map((brand) =>
        brand.split("-").map((brand) => brand.charAt(0).toUpperCase() + brand.slice(1)).join(" ")
      ).join(", ");

      const allData = [i, name, age, gender, smoking, brand].map((data) => makeRowData(data));
      row.append(...allData);
      return row;
    }

    const data = JSON.parse(window.localStorage.getItem("data"));

    const dataEls = data.map((e, i) => makeRow(i + 1, e));
    tbody.append(...dataEls);
  </script>
